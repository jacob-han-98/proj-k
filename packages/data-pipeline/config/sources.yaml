# 크롤링 소스 설정
# python -m src.cli sources sync  로 이 파일을 DB에 반영

sources:
  # ── Perforce 소스 ──────────────────────────────
  - name: "7_System 기획서"
    type: perforce
    path: "//main/ProjectK/.../7_System/..."
    convert_strategy: vision-first
    schedule: daily
    properties:
      local_path: "/home/jacob/p4sync/Design/7_System"
      description: "핵심 시스템 기획서"
      file_types: ["xlsx"]

  - name: "8_Contents 컨텐츠 기획서"
    type: perforce
    path: "//main/ProjectK/.../8_Contents/..."
    convert_strategy: vision-first
    schedule: manual
    properties:
      local_path: "/home/jacob/p4sync/Design/8_Contents"
      description: "컨텐츠 디자인 기획서 (xlsx)"
      file_types: ["xlsx"]

  - name: "DataSheet"
    type: perforce
    path: "//main/ProjectK/.../DataSheet/..."
    convert_strategy: table-parser
    schedule: daily
    properties:
      local_path: "/home/jacob/p4sync/Design/DataSheet"
      description: "게임 데이터시트 — 클라/서버 실제 사용 수치 데이터 (tool calling용)"
      file_types: ["xlsx"]

  # ── Confluence 소스 ────────────────────────────
  - name: "Confluence"
    type: confluence
    path: "3666773573"                            # root_page_id (Design)
    convert_strategy: html-to-md
    schedule: daily
    properties:
      description: "Project K 게임디자인 문서"
      enrich_images: true                        # 이미지 보강 활성화

