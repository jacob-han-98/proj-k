# Project K QnA — nginx 리버스 프록시 설정
# 위치: /etc/nginx/sites-available/proj-k-agent (또는 기존 server 블록에 location 추가)
#
# 사용법:
#   기존 cp.tech2.hybe.im server 블록에 아래 location 블록만 추가하면 됩니다.
#   sudo nginx -t && sudo systemctl reload nginx

# ── 기존 server 블록 안에 추가할 location ──

location /proj-k-agent/ {
    proxy_pass http://127.0.0.1:8502/proj-k-agent/;
    proxy_http_version 1.1;

    # WebSocket 지원 (Streamlit 필수)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streamlit SSE/WebSocket 타임아웃 (답변 생성 최대 60초)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

# Streamlit static 파일 (/_stcore/ 경로)
location /proj-k-agent/_stcore/ {
    proxy_pass http://127.0.0.1:8502/proj-k-agent/_stcore/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
}
